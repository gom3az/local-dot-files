# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev

# Create a new pane to the right with a width of 50 cells
bind g split-window -h -p 30 -c "#{pane_current_path}"

# -- Basic Settings ------------------------------------------
set -g prefix C-b
set -g escape-time 500
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on

# -- Status Bar ---------------------------------------------
set -g default-terminal "tmux-256color"
set-option -g automatic-rename off
set-option -g allow-rename off

set -g status-justify right

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
set -ag status-right ""

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# -- Plugins -----------------------------------------------
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor 'mocha' 

# Other plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Override Catppuccin colors with dynamic wallpaper theme (runs after plugin)
run 'tmux source-file ~/.config/tmux/tmux-colors.conf'

run '~/.tmux/plugins/tpm/tpm'
