# Static theme: gruvbox
[app]
overall = { bg = "#282828" }
[mgr]
cwd = { fg = "#b16286" }
find_keyword = { fg = "#d79921", bold = true }
find_position = { fg = "#b16286" }
symlink_target = { fg = "#689d6a" }
marker_copied = { fg = "#98971a" }
marker_cut = { fg = "#cc241d" }
marker_marked = { fg = "#b16286" }
marker_selected = { fg = "#458588" }
count_copied = { fg = "#98971a" }
count_cut = { fg = "#cc241d" }
count_selected = { fg = "#458588" }
border_symbol = "│"
border_style = { fg = "#504945" }
[indicator]
parent = { bg = "#3c3836" }
current = { bg = "#504945" }
preview = { bg = "#3c3836" }
[tabs]
active = { fg = "#ebdbb2", bg = "#504945" }
inactive = { fg = "#bdae93", bg = "#1d2021" }
[mode]
normal_main = { fg = "#282828", bg = "#458588" }
normal_alt = { fg = "#ebdbb2", bg = "#3c3836" }
select_main = { fg = "#282828", bg = "#b16286" }
select_alt = { fg = "#ebdbb2", bg = "#3c3836" }
unset_main = { fg = "#282828", bg = "#689d6a" }
unset_alt = { fg = "#ebdbb2", bg = "#3c3836" }
[status]
overall = { bg = "#3c3836" }
perm_type = { fg = "#b16286" }
perm_read = { fg = "#98971a" }
perm_write = { fg = "#d79921" }
perm_exec = { fg = "#cc241d" }
perm_sep = { fg = "#bdae93" }
progress_label = { fg = "#ebdbb2" }
progress_normal = { bg = "#504945" }
progress_error = { bg = "#cc241d" }
[which]
cols = 2
mask = { bg = "#3c3836" }
cand = { fg = "#b16286", bold = true }
rest = { fg = "#bdae93" }
desc = { fg = "#ebdbb2" }
separator = "  "
separator_style = { fg = "#bdae93" }
[confirm]
border = { fg = "#504945" }
title = { fg = "#b16286", bold = true }
body = { fg = "#ebdbb2" }
list = { fg = "#d5c4a1" }
btn_yes = { fg = "#98971a" }
btn_no = { fg = "#cc241d" }
[spot]
border = { fg = "#504945" }
title = { fg = "#b16286" }
tbl_col = { fg = "#b16286" }
tbl_cell = { fg = "#ebdbb2" }
[notify]
title_info = { fg = "#458588", bold = true }
title_warn = { fg = "#d79921", bold = true }
title_error = { fg = "#cc241d", bold = true }
[pick]
border = { fg = "#504945" }
active = { fg = "#282828", bg = "#b16286" }
inactive = { fg = "#ebdbb2" }
[input]
border = { fg = "#504945" }
title = { fg = "#b16286" }
value = { fg = "#ebdbb2" }
selected = { fg = "#b16286", bold = true }
[cmp]
border = { fg = "#504945" }
active = { fg = "#282828", bg = "#b16286" }
inactive = { fg = "#ebdbb2" }
[tasks]
border = { fg = "#504945" }
title = { fg = "#b16286" }
hovered = { fg = "#282828", bg = "#b16286" }
[help]
on = { fg = "#b16286", bold = true }
run = { fg = "#ebdbb2" }
desc = { fg = "#d5c4a1" }
hovered = { fg = "#282828", bg = "#b16286" }
footer = { fg = "#bdae93" }
[filetype]
rules = [
    { mime = "image/*", fg = "#689d6a" },
    { mime = "{audio,video}/*", fg = "#b16286" },
    { mime = "inode/empty", fg = "#bdae93" },
    { mime = "text/*", fg = "#98971a" },
    { mime = "application/gzip", fg = "#cc241d" },
    { mime = "application/zip", fg = "#cc241d" },
    { mime = "application/x-{tar,bzip*}*", fg = "#cc241d" },
    { mime = "application/pdf", fg = "#d79921" },
    { url = "*/", fg = "#458588" },
    { url = "*", is = "orphan", fg = "#cc241d" },
]
